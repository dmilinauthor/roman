<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лаборатория проекта — Второй звонок</title>
<link class="foreign" rel="icon" href="images/51.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oranienbaum&family=Literatta:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600;6..72,700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html {
  scroll-behavior: smooth;
}
body {
  background: #0b0a08 url('images/62.png') no-repeat center center fixed;
  background-size: cover;
  color: #e0d5b0;
  font-family: 'Literatta', Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3rem 1.5rem;
}

/* УЗКАЯ ЧЕРНАЯ ПОЛОСКА МЕНЮ СВЕРХУ */
.top-navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 55px;
  background: #000000;
  border-bottom: 1px solid rgba(201, 169, 110, 0.15);
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 2.5rem;
  z-index: 150;
}
.nav-link {
  color: #8A7E6B;
  font-family: 'Literatta', Georgia, serif;
  font-size: 0.85rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  text-decoration: none;
  transition: color 0.3s ease;
  cursor: pointer;
  background: transparent;
  border: none;
  outline: none;
}
.nav-link:hover, .nav-link.active {
  color: #C9A96E;
}

/* КОНТЕЙНЕР ДЛЯ МАТЕРИАЛОВ */
.document-wrapper {
  max-width: 900px;
  width: 100%;
  margin: 95px auto 4rem; /* ОТСТУП ПОД МЕНЮ */
  padding: 0 1.5rem;
  z-index: 10;
  animation: fadeIn 1.5s ease-out;
}

/* ЧЕРНАЯ ПОДЛОЖКА ТЕКСТА С ТЕНЬЮ И РАМКОЙ */
.content-inner {
  max-width: 880px;
  margin: 0 auto;
  padding: 4rem 3.5rem 6rem;
  background: #0b0a08;
  box-shadow: 0 0 80px rgba(0,0,0,0.9);
  border-left: 1px solid rgba(201, 169, 110, 0.08);
  border-right: 1px solid rgba(201, 169, 110, 0.08);
}

.doc-title {
  text-align: center;
  font-size: 2.2rem;
  font-family: 'Oranienbaum', Georgia, serif;
  color: #C9A96E;
  margin-bottom: 2rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.novel-author {
  text-align: center;
  font-size: 1.1rem;
  color: #8A7E6B;
  font-family: 'Literatta', Georgia, serif;
  font-weight: 300;
  letter-spacing: 0.05em;
  margin-bottom: 2rem;
}

.doc-paragraph {
  margin-bottom: 1.5rem;
  text-align: left; /* ИСПРАВЛЕНО: ВЫРАВНИВАНИЕ ПО ЛЕВОМУ КРАЮ */
  font-size: 1.2rem;
  line-height: 1.75;
  font-weight: 300;
}

.img-inline {
  max-width: 100%;
  height: auto;
  margin: 2rem auto 3rem;
  display: block;
  border: 1px solid rgba(201, 169, 110, 0.15);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

/* МОДАЛЬНОЕ ОКНО КОНТАКТОВ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(11, 10, 8, 0.88);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 200;
}
.modal-overlay.show {
  opacity: 1;
  pointer-events: auto;
}
.modal-card {
  background: #0b0a08;
  border: 1px solid #C9A96E;
  padding: 3rem 2.5rem 2.5rem;
  max-width: 500px;
  width: 100%;
  box-shadow: 0 0 60px rgba(201, 169, 110, 0.15);
  position: relative;
  transform: translateY(20px);
  transition: transform 0.3s ease;
}
.modal-overlay.show .modal-card {
  transform: translateY(0);
}
.modal-close {
  position: absolute;
  top: 1rem;
  right: 1.2rem;
  background: transparent;
  border: none;
  color: #8A7E6B;
  font-size: 1.5rem;
  cursor: pointer;
  transition: color 0.3s;
}
.modal-close:hover {
  color: #C9A96E;
}
.modal-card h3 {
  font-family: 'Oranienbaum', Georgia, serif;
  color: #C9A96E;
  font-size: 1.5rem;
  margin-bottom: 0.5rem;
  letter-spacing: 0.05em;
  text-align: center;
}
.modal-card p {
  color: #8A7E6B;
  margin-bottom: 1.5rem;
  font-size: 0.9rem;
  line-height: 1.4;
  text-align: center;
}

/* БЛАНК ШИФРОВКИ */
.feedback-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.feedback-form input, .feedback-form textarea {
  background: #161512;
  border: 1px solid rgba(201, 169, 110, 0.25);
  color: #e0d5b0;
  font-family: 'Literatta', Georgia, serif;
  padding: 0.75rem;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.3s;
}
.feedback-form input:focus, .feedback-form textarea:focus {
  border-color: #C9A96E;
}
.feedback-form textarea {
  resize: vertical;
  min-height: 100px;
}
.form-submit {
  padding: 0.8rem;
  background: transparent;
  border: 1px solid #C9A96E;
  color: #C9A96E;
  font-family: 'Literatta', Georgia, serif;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: 0.3s;
}
.form-submit:hover {
  background: #C9A96E;
  color: #0b0a08;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(1%) scale(0.99); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
