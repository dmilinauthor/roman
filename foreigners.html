<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сотрудничество — Второй звонок</title>
<link rel="icon" href="images/51.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oranienbaum&family=Literatta:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600;6..72,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0b0a08 url('images/62.jpg') no-repeat center center fixed; /* ПОДЛОЖКА 62.jpg */
  background-size: cover;
  color:#e0d5b0;
  font-family:'Literatta',Georgia,serif;
  min-height:100vh;
  overflow-x:hidden;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:3rem 1.5rem;
}

/* УЗКАЯ ЧЕРНАЯ ПОЛОСКА МЕНЮ СВЕРХУ */
.top-navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 55px;
  background: #000000;
  border-bottom: 1px solid rgba(201, 169, 110, 0.15);
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 2.5rem;
  z-index: 150;
}
.nav-link {
  color: #8A7E6B;
  font-family: 'Literatta', Georgia, serif;
  font-size: 0.85rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  text-decoration: none;
  transition: color 0.3s ease;
  cursor: pointer;
  background: transparent;
  border: none;
  outline: none;
}
.nav-link:hover, .nav-link.active {
  color: #C9A96E;
}

/* ГЛАВНЫЙ КОНТЕЙНЕР (СДВИГАЕМ НА 55px ВНИЗ ПОД МЕНЮ) */
.archive-wrapper {
  max-width: 1200px;
  width: 100%;
  margin: 55px auto 0;
  padding: 3rem 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 2rem;
  animation: fadeIn 1.5s ease-out;
}

/* ГРАФИЧЕСКАЯ ПЛАШКА-ЗАГЛОВОК 72.png */
.archive-header-banner {
  display: block;
  width: 100%;
  max-width: 1200px;
  height: auto;
  border: 1px solid rgba(201, 169, 110, 0.3);
  box-shadow: 0 0 50px rgba(201, 169, 110, 0.08);
  margin-bottom: 1rem;
}

/* ГЛУХАЯ ПОЛУПРОЗРАЧНАЯ ПОДЛОЖКА-КАРТОЧКА */
.archive-card {
  background: rgba(11, 10, 8, 0.94); /* 94% ТЕМНОТЫ ДЛЯ ИДЕАЛЬНОЙ ЧИТАЕМОСТИ */
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(201, 169, 110, 0.12);
  padding: 2.5rem;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
}

/* ДВУХКОЛОНОЧНЫЙ СТОЛ НА ПК */
.split-layout {
  display: flex;
  gap: 3rem;
  width: 100%;
}

.left-column {
  flex: 1.1; /* КОЛОНКА ПОД ПОРТРЕТ И СИНОПСИС */
  display: flex;
  flex-direction: column;
}
.author-portrait {
  width: 100%;
  height: auto;
  border: 1px solid rgba(201, 169, 110, 0.2);
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  margin-bottom: 1.5rem;
}

.right-column {
  flex: 1.9; /* КОЛОНКА ПОД СЕГМЕНТЫ */
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.synopsis-text {
  color: #e0d5b0;
  font-size: 1.2rem;
  line-height: 1.75;
  margin-bottom: 1.5rem;
  font-weight: 300;
  text-align: left; /* ВЫРАВНИВАНИЕ ПО ЛЕВОМУ КРАЮ */
}
.synopsis-text:last-child {
  margin-bottom: 0;
}

.section-divider {
  font-family: 'Oranienbaum', Georgia, serif;
  color: #C9A96E;
  font-size: 1.4rem;
  margin-bottom: 1.5rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border-bottom: 1px solid rgba(201, 169, 110, 0.15);
  padding-bottom: 0.5rem;
}

/* СТРОГИЙ СПИСОК С ОДНОТОННЫМИ ОСЯМИ-РАЗДЕЛИТЕЛЯМИ */
.coop-list {
  display: flex;
  flex-direction: column;
  width: 100%;
}
.coop-item {
  padding-bottom: 1.5rem;
  margin-bottom: 1.5rem;
  border-bottom: 1px solid rgba(201, 169, 110, 0.08); /* ТОНКАЯ ОСЬ */
}
.coop-item:last-child {
  border-bottom: none;
  margin-bottom: 0;
  padding-bottom: 0;
}
.coop-item-title {
  font-family: 'Oranienbaum', Georgia, serif;
  color: #C9A96E;
  font-size: 1.25rem;
  margin-bottom: 0.5rem;
  letter-spacing: 0.03em;
}
.coop-item-desc {
  font-size: 0.95rem;
  color: #8A7E6B;
  font-weight: 300;
  line-height: 1.4;
  text-align: left; /* ВЫРАВНИВАНИЕ ПО ЛЕВОМУ КРАЮ */
}

/* КНОПКИ ВЫБОРА ЯЗЫКА (ГРАФИЧЕСКИЕ КНОПКИ) */
.language-tabs {
  display: flex;
  gap: 1.5rem;
  justify-content: flex-start;
  width: 100%;
  margin-top: 1rem;
}
.tab-img-btn {
  background: transparent;
  border: none;
  outline: none;
  cursor: pointer;
  flex: 1;
  max-width: 180px;
  display: block;
  text-decoration: none;
  transition: transform 0.3s ease;
}
.btn-img {
  display: block;
  width: 100%;
  height: auto;
  border: 1px solid rgba(201, 169, 110, 0.25);
  box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
  transition: all 0.3s ease;
}
.tab-img-btn:hover .btn-img {
  border-color: #C9A96E;
  box-shadow: 0 0 45px rgba(201, 169, 110, 0.25);
  transform: scale(1.03);
}

/* ПРЕИМУЩЕСТВА СНИЗУ В ОДИН ГОРИЗОНТАЛЬНЫЙ РЯД НА ПК */
.advantages-row {
  display: flex;
  gap: 2.5rem;
  width: 100%;
  margin-top: 1.5rem;
}
.advantage-col {
  flex: 1;
  display: flex;
  gap: 1.5rem;
  align-items: flex-start;
}
.advantage-num {
  font-family: 'Oranienbaum', Georgia, serif;
  color: #C9A96E;
  font-size: 1.5rem;
  font-style: italic;
  line-height: 1;
}
.advantage-info {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}
.advantage-title {
  font-family: 'Oranienbaum', Georgia, serif;
  color: #C9A96E;
  font-size: 1.15rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.advantage-desc {
  font-size: 0.95rem;
  color: #8A7E6B;
  font-weight: 300;
  line-height: 1.4;
  text-align: left; /* ВЫРАВНИВАНИЕ ПО ЛЕВОМУ КРАЮ */
}

/* МОДАЛЬНОЕ ОКНО КОНТАКТОВ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(11, 10, 8, 0.88);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 200;
}
.modal-overlay.show {
  opacity: 1;
  pointer-events: auto;
}
.modal-card {
  background: #0b0a08;
  border: 1px solid #C9A96E;
  padding: 3rem 2.5rem 2.5rem;
  max-width: 500px;
  width: 100%;
  box-shadow: 0 0 60px rgba(201, 169, 110, 0.15);
  position: relative;
  transform: translateY(20px);
  transition: transform 0.3s ease;
}
.modal-overlay.show .modal-card {
  transform: translateY(0);
}
.modal-close {
  position: absolute;
  top: 1rem;
  right: 1.2rem;
  background: transparent;
  border: none;
  color: #8A7E6B;
  font-size: 1.5rem;
  cursor: pointer;
  transition: color 0.3s;
}
.modal-close:hover {
  color: #C9A96E;
}
.modal-card h3 {
  font-family: 'Oranienbaum', Georgia, serif;
  color: #C9A96E;
  font-size: 1.5rem;
  margin-bottom: 0.5rem;
  letter-spacing: 0.05em;
  text-align: center;
}
.modal-card p {
  color: #8A7E6B;
  margin-bottom: 1.5rem;
  font-size: 0.9rem;
  line-height: 1.4;
  text-align: center;
}

/* БЛАНК ШИФРОВКИ */
.feedback-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.feedback-form input, .feedback-form textarea {
  background: #161512;
  border: 1px solid rgba(201, 169, 110, 0.25);
  color: #e0d5b0;
  font-family: 'Literatta', Georgia, serif;
  padding: 0.75rem;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.3s;
}
.feedback-form input:focus, .feedback-form textarea:focus {
  border-color: #C9A96E;
}
.feedback-form textarea {
  resize: vertical;
  min-height: 100px;
}
.form-submit {
  padding: 0.8rem;
  background: transparent;
  border: 1px solid #C9A96E;
  color: #C9A96E;
  font-family: 'Literatta', Georgia, serif;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: 0.3s;
}
.form-submit:hover {
  background: #C9A96E;
  color: #0b0a08;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(1%) scale(0.99); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@media(max-width: 900px){
  .split-layout {
    flex-direction: column; /* НА СМАРТФОНАХ ПОРТРЕТ И СИНОПСИС ИДУТ НАВЕРХ */
    gap: 1.5rem;
  }
  .archive-card {
    padding: 1.8rem 1.2rem;
  }
  .advantages-row {
    flex-direction: column; /* НА МОБИЛЬНЫХ ПРЕИМУЩЕСТВА СТАКУЮТСЯ ВЕРТИКАЛЬНО */
    gap: 1.5rem;
  }
  .language-tabs {
    flex-direction: column;
    align-items: center;
