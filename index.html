<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест плашки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0a08;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            flex-direction: column;
        }
        #start-screen {
            text-align: center;
        }
        #start-screen img {
            max-width: 90%;
            max-height: 70vh;
            border: 2px solid #d4af37;
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.15);
        }
        #start-screen button {
            margin-top: 40px;
            padding: 16px 48px;
            background: transparent;
            border: 2px solid #d4af37;
            color: #d4af37;
            font-family: 'Georgia', serif;
            font-size: 1.3rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        #start-screen button:hover {
            background: #d4af37;
            color: #0b0a08;
        }
        #main-content {
            display: none;
            text-align: center;
            color: #d4af37;
            font-size: 2rem;
            font-family: 'Georgia', serif;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <img src="images/51.png" alt="Второй звонок">
        <button onclick="enterSite()">Ознакомиться с материалами</button>
    </div>

    <div id="main-content">
        <h1>✅ Кнопка работает!</h1>
        <p>Текст и картинки появятся здесь.</p>
    </div>

    <script>
        function enterSite() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }
    </script>

</body>
</html>
