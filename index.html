<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Второй звонок — Дмитрий Ильин</title>
    <link rel="icon" href="images/51.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Literatta:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Literatta', serif;
            min-height: 100vh;
        }

        /* Верхнее меню */
        .nav {
            width: 100%;
            height: 60px;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            border-bottom: 1px solid rgba(201, 169, 110, 0.2);
            z-index: 100;
        }
        .nav a, .nav button {
            color: #8A7E6B;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 2px;
            background: none;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .nav a:hover, .nav button:hover { color: #C9A96E; }

        /* Контейнер для арта */
        .container {
            position: relative;
            margin-top: 40px;
            width: 95%;
            max-width: 1100px;
        }
        .art-image {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid rgba(201, 169, 110, 0.15);
        }

        /* Сгенерированная кнопка ЧИТАТЬ */
        .read-btn {
            position: absolute;
            left: 10.8%; /* Выравнивание под текстом на картинке */
            bottom: 4.5%; /* Отступ вниз от букв текста */
            padding: 10px 40px;
            border: 1px solid rgba(201, 169, 110, 0.6);
            color: #C9A96E;
            text-transform: uppercase;
            text-decoration: none;
            background: rgba(0, 0, 0, 0.5);
            letter-spacing: 4px;
            font-size: 14px;
            transition: 0.3s;
        }
        .read-btn:hover {
            background: #C9A96E;
            color: #000;
            box-shadow: 0 0 20px rgba(201, 169, 110, 0.3);
        }

        /* Адаптация для мобильных */
        @media (max-width: 700px) {
            .nav { gap: 15px; height: 50px; }
            .nav a { font-size: 10px; }
            .read-btn { 
                position: relative; 
                left: 0; 
                bottom: 0; 
                margin: 20px auto; 
                display: table;
            }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <nav class="nav">
        <a href="materials.html">Архив</a>
        <a href="foreigners.html">En | De | Fr</a>
        <a href="laboratory.html">За кулисами</a>
        <button onclick="document.getElementById('modal').style.display='flex'">Контакты</button>
    </nav>

    <div class="container">
        <!-- Ваша идеальная картинка 85.png -->
        <img src="images/85.png" class="art-image" alt="Второй звонок">
        
        <!-- Сгенерированная кнопка под текстом -->
        <a href="reader.html" class="read-btn">Читать</a>
    </div>

    <!-- Модальное окно контактов -->
    <div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; align-items:center; justify-content:center; padding:20px;">
        <div style="background:#0b0a08; border:1px solid #C9A96E; padding:40px; max-width:450px; width:100%; position:relative; box-shadow: 0 0 50px rgba(0,0,0,1);">
            <button onclick="this.parentElement.parentElement.style.display='none'" style="position:absolute; top:15px; right:15px; color:#8A7E6B; background:none; border:none; cursor:pointer; font-size:20px;">✕</button>
            <h2 style="color:#C9A96E; text-align:center; font-weight:normal; margin-bottom:10px; letter-spacing:2px;">СВЯЗЬ</h2>
            <p style="color:#8A7E6B; text-align:center; font-size:13px; margin-bottom:25px;">Экстренный канал для отзывов и донесений</p>
            <form action="https://formspree.io/f/mgojzbba" method="POST" style="display:flex; flex-direction:column; gap:15px;">
                <input type="text" name="name" placeholder="Ваш позывной" required style="background:#111; border:1px solid #333; color:#e0d5b0; padding:12px; font-family:inherit; outline:none;">
                <input type="email" name="email" placeholder="Ваш Email" required style="background:#111; border:1px solid #333; color:#e0d5b0; padding:12px; font-family:inherit; outline:none;">
                <textarea name="message" placeholder="Текст сообщения" required style="background:#111; border:1px solid #333; color:#e0d5b0; padding:12px; font-family:inherit; min-height:120px; outline:none; resize:none;"></textarea>
                <button type="submit" style="background:none; border:1px solid #C9A96E; color:#C9A96E; padding:12px; cursor:pointer; letter-spacing:2px; text-transform:uppercase; transition: 0.3s;">ОТПРАВИТЬ</button>
            </form>
        </div>
    </div>

</body>
</html>
